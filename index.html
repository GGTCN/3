<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 3D 冒險 - 大世界與雙武器版</title>
    <!-- 引入 Three.js 3D 繪圖庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* 畫面中央準心 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 5px; left: 0; width: 12px; height: 2px; }
        #crosshair::after { top: 0; left: 5px; width: 2px; height: 12px; }

        /* UI 介面 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .stats-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #444;
            display: inline-block;
            max-width: 280px;
        }
        .bar-container {
            width: 100%;
            height: 16px;
            background: #333;
            border-radius: 8px;
            margin-top: 6px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .hp-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4d4d, #cc0000);
            transition: width 0.1s ease-out;
        }
        .hotbar {
            align-self: center;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            border-radius: 12px;
            border: 2px solid #555;
            pointer-events: auto;
        }
        .slot {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #777;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #aaa;
            position: relative;
            cursor: pointer;
        }
        .slot.active {
            border-color: #ffe600;
            background: rgba(255, 230, 0, 0.2);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
        }
        .slot-key {
            position: absolute;
            top: 2px;
            left: 5px;
            font-size: 10px;
            color: #888;
        }

        /* 鎖定滑鼠提示畫面 */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
        }
        #instructions {
            text-align: center;
            color: white;
        }
        #instructions h1 { font-size: 36px; margin-bottom: 10px; }
        #instructions p { font-size: 18px; color: #ccc; margin: 5px 0; }

        /* 受傷紅框特效 */
        #damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.35);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease-out;
        }
        #game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff3333;
            text-align: center;
            display: none;
            z-index: 20;
        }
        #game-over button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="crosshair"></div>
        <div id="damage-overlay"></div>

        <div id="blocker">
            <div id="instructions">
                <h1>點擊畫面開始遊戲</h1>
                <p>WASD / 方向鍵：移動</p>
                <p>滑鼠：旋轉 3D 視角</p>
                <p>滑鼠左鍵：攻擊 / 射擊</p>
                <p>數字鍵 1 / 2：切換武器（刀 / 弓）</p>
            </div>
        </div>

        <div id="ui-layer">
            <div class="stats-panel">
                <div>❤️ 生命值: <span id="hp-text">100</span> / 100</div>
                <div class="bar-container"><div id="hp-bar" class="hp-bar"></div></div>
                <div style="margin-top: 8px;">🎯 擊殺數: <span id="score-text">0</span></div>
            </div>
            <div class="hotbar">
                <div class="slot active" id="slot-1" onclick="setWeapon('sword')">
                    <span class="slot-key">1</span>
                    ⚔️ 鑽石劍
                </div>
                <div class="slot" id="slot-2" onclick="setWeapon('bow')">
                    <span class="slot-key">2</span>
                    🏹 弓箭
                </div>
            </div>
        </div>

        <div id="game-over">
            <h1>💀 你倒下了！</h1>
            <p style="margin-top: 10px; color: #aaa;">生存戰績: <span id="final-score">0</span> 隻怪物</p>
            <button onclick="resetGame()">重新開始</button>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------------
        // 1. 初始化 3D 場景、攝影機與渲染器
        // ---------------------------------------------------------------
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 天空藍
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.015); // 遠方迷霧

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // 光源設定
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(100, 150, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 300;
        const d = 100;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);

        // ---------------------------------------------------------------
        // 2. 地形生成 (放大版 3D 世界)
        // ---------------------------------------------------------------
        const WORLD_SIZE = 160; // 超大 3D 地形
        const HALF_WORLD = WORLD_SIZE / 2;

        // 草地地面
        const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 32, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x557a2b, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 邊界牆碰撞箱列表
        const obstacles = [];

        // 隨機生成 3D 樹木
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // 樹幹
            const trunkGeo = new THREE.BoxGeometry(1, 4, 1);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 2;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // 樹葉 (Minecraft 方塊風格)
            const leavesGeo = new THREE.BoxGeometry(3, 3, 3);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 4.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);

            // 紀錄碰撞箱 (AABB 邏輯)
            obstacles.push({
                minX: x - 0.8, maxX: x + 0.8,
                minZ: z - 0.8, maxZ: z + 0.8
            });
        }

        // 生成 60 棵樹木
        for (let i = 0; i < 60; i++) {
            const tx = (Math.random() - 0.5) * (WORLD_SIZE - 20);
            const tz = (Math.random() - 0.5) * (WORLD_SIZE - 20);
            if (Math.hypot(tx, tz) > 8) { // 避開出生點
                createTree(tx, tz);
            }
        }

        // 世界邊界障礙物
        obstacles.push({ minX: -HALF_WORLD, maxX: -HALF_WORLD + 1, minZ: -HALF_WORLD, maxZ: HALF_WORLD });
        obstacles.push({ minX: HALF_WORLD - 1, maxX: HALF_WORLD, minZ: -HALF_WORLD, maxZ: HALF_WORLD });
        obstacles.push({ minX: -HALF_WORLD, maxX: HALF_WORLD, minZ: -HALF_WORLD, maxZ: -HALF_WORLD + 1 });
        obstacles.push({ minX: -HALF_WORLD, maxX: HALF_WORLD, minZ: HALF_WORLD - 1, maxZ: HALF_WORLD });

        // ---------------------------------------------------------------
        // 3. 玩家控制與 Minecraft 3D AABB 碰撞機制
        // ---------------------------------------------------------------
        const player = {
            position: new THREE.Vector3(0, 1.6, 0), // 視線高度 1.6m
            velocity: new THREE.Vector3(),
            radius: 0.4, // AABB 半寬
            speed: 0.15,
            hp: 100,
            score: 0,
            activeWeapon: 'sword',
            attackCooldown: 0,
            isDead: false
        };

        // 第一人稱視角旋轉控制 (PointerLock)
        let pitch = 0, yaw = 0;
        const blocker = document.getElementById('blocker');
        
        blocker.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                blocker.style.display = 'none';
            } else {
                if (!player.isDead) blocker.style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body || player.isDead) return;
            yaw -= e.movementX * 0.0022;
            pitch -= e.movementY * 0.0022;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
        });

        // 鍵盤狀態
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === '1') setWeapon('sword');
            if (e.key === '2') setWeapon('bow');
        });
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 3D AABB 滑順貼牆移動邏輯
        function movePlayerWithCollision(dx, dz) {
            // 先在 X 軸移動並檢測碰撞
            let newX = player.position.x + dx;
            let playerMinX = newX - player.radius;
            let playerMaxX = newX + player.radius;
            let playerMinZ = player.position.z - player.radius;
            let playerMaxZ = player.position.z + player.radius;

            let collideX = false;
            for (let obs of obstacles) {
                if (playerMaxX > obs.minX && playerMinX < obs.maxX &&
                    playerMaxZ > obs.minZ && playerMinZ < obs.maxZ) {
                    collideX = true;
                    break;
                }
            }
            if (!collideX) player.position.x = newX;

            // 再在 Z 軸移動並檢測碰撞
            let newZ = player.position.z + dz;
            playerMinX = player.position.x - player.radius;
            playerMaxX = player.position.x + player.radius;
            playerMinZ = newZ - player.radius;
            playerMaxZ = newZ + player.radius;

            let collideZ = false;
            for (let obs of obstacles) {
                if (playerMaxX > obs.minX && playerMinX < obs.maxX &&
                    playerMaxZ > obs.minZ && playerMinZ < obs.maxZ) {
                    collideZ = true;
                    break;
                }
            }
            if (!collideZ) player.position.z = newZ;
        }

        // ---------------------------------------------------------------
        // 4. 3D 雙武器系統 (第一人稱刀與弓模型)
        // ---------------------------------------------------------------
        const weaponGroup = new THREE.Group();
        camera.add(weaponGroup);
        scene.add(camera);

        // 刀 (鑽石劍模型)
        const swordGroup = new THREE.Group();
        const bladeGeo = new THREE.BoxGeometry(0.08, 0.8, 0.04);
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.3 }); // 鑽石藍
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.position.set(0, 0.4, 0);
        swordGroup.add(blade);

        const hiltGeo = new THREE.BoxGeometry(0.3, 0.06, 0.06);
        const hiltMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const hilt = new THREE.Mesh(hiltGeo, hiltMat);
        hilt.position.set(0, 0.05, 0);
        swordGroup.add(hilt);

        swordGroup.position.set(0.35, -0.3, -0.5);
        swordGroup.rotation.set(0.2, -0.3, 0);
        weaponGroup.add(swordGroup);

        // 弓模型
        const bowGroup = new THREE.Group();
        const bowGeo = new THREE.TorusGeometry(0.3, 0.02, 8, 16, Math.PI);
        const bowMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const bow = new THREE.Mesh(bowGeo, bowMat);
        bowGroup.add(bow);
        bowGroup.position.set(0.35, -0.3, -0.5);
        bowGroup.rotation.set(0, -Math.PI / 2, 0);
        bowGroup.visible = false;
        weaponGroup.add(bowGroup);

        function setWeapon(type) {
            player.activeWeapon = type;
            swordGroup.visible = (type === 'sword');
            bowGroup.visible = (type === 'bow');
            document.getElementById('slot-1').classList.toggle('active', type === 'sword');
            document.getElementById('slot-2').classList.toggle('active', type === 'bow');
        }

        // 攻擊事件 (滑鼠點擊)
        let isSwinging = false;
        let swingTimer = 0;

        document.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || document.pointerLockElement !== document.body || player.isDead) return;
            if (player.attackCooldown > 0) return;

            if (player.activeWeapon === 'sword') {
                // 刀近戰砍擊
                player.attackCooldown = 15;
                isSwinging = true;
                swingTimer = 0;

                // 3D 扇形攻擊檢測
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);

                monsters.forEach(m => {
                    const toMonster = m.mesh.position.clone().sub(player.position);
                    const dist = toMonster.length();
                    toMonster.normalize();

                    // 距離小於 3.5 公尺且在視線前方 60 度角內
                    if (dist < 3.5 && forward.dot(toMonster) > 0.5) {
                        m.hp -= 20;
                        // 擊退
                        m.mesh.position.add(forward.clone().multiplyScalar(1.2));
                    }
                });
            } else if (player.activeWeapon === 'bow') {
                // 弓箭遠程射擊
                player.attackCooldown = 25;
                shootArrow();
            }
        });

        // ---------------------------------------------------------------
        // 5. 箭矢與怪物系統 (3D 苦力怕)
        // ---------------------------------------------------------------
        const arrows = [];
        const monsters = [];

        function shootArrow() {
            const arrowGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.6);
            const arrowMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
            const arrow = new THREE.Mesh(arrowGeo, arrowMat);

            arrow.position.copy(player.position);
            
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);

            scene.add(arrow);
            arrows.push({ mesh: arrow, dir: dir, velocity: 1.2, life: 100 });
        }

        function spawnMonster() {
            if (monsters.length >= 20 || player.isDead) return;

            // 在玩家身邊隨機距離生成 3D 苦力怕
            const angle = Math.random() * Math.PI * 2;
            const dist = 25 + Math.random() * 15;
            const mx = player.position.x + Math.cos(angle) * dist;
            const mz = player.position.z + Math.sin(angle) * dist;

            // 苦力怕 3D 模型
            const mGroup = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.8, 1.8, 0.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x33aa33 }); // 苦力怕綠
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.9;
            body.castShadow = true;
            mGroup.add(body);

            mGroup.position.set(mx, 0, mz);
            scene.add(mGroup);

            monsters.push({
                mesh: mGroup,
                hp: 35,
                maxHp: 35,
                speed: 0.05,
                attackCooldown: 0
            });
        }
        setInterval(spawnMonster, 2500);

        // 觸發受傷特效
        const damageOverlay = document.getElementById('damage-overlay');
        function triggerDamage() {
            damageOverlay.style.opacity = '1';
            setTimeout(() => { damageOverlay.style.opacity = '0'; }, 120);
        }

        // ---------------------------------------------------------------
        // 6. 遊戲主循環 (60 FPS 絲滑運算)
        // ---------------------------------------------------------------
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (player.isDead) {
                renderer.render(scene, camera);
                return;
            }

            // A. 更新視角方向
            const euler = new THREE.Euler(0, 0, 0, 'YXZ');
            euler.x = pitch;
            euler.y = yaw;
            camera.quaternion.setFromEuler(euler);

            // B. 玩家 3D WASD 移動計算
            const moveDir = new THREE.Vector3();
            if (keys['w']) moveDir.z -= 1;
            if (keys['s']) moveDir.z += 1;
            if (keys['a']) moveDir.x -= 1;
            if (keys['d']) moveDir.x += 1;
            moveDir.normalize();

            if (moveDir.length() > 0) {
                // 將相對方向轉為世界方向
                moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                movePlayerWithCollision(moveDir.x * player.speed, moveDir.z * player.speed);
            }
            camera.position.copy(player.position);

            // C. 刀揮砍動畫
            if (player.attackCooldown > 0) player.attackCooldown--;
            if (isSwinging) {
                swingTimer += 0.2;
                swordGroup.rotation.x = 0.2 + Math.sin(swingTimer * Math.PI) * 1.2;
                swordGroup.rotation.y = -0.3 - Math.sin(swingTimer * Math.PI) * 0.8;
                if (swingTimer >= 1) {
                    isSwinging = false;
                    swordGroup.rotation.set(0.2, -0.3, 0);
                }
            }

            // D. 箭矢飛行與碰撞
            for (let i = arrows.length - 1; i >= 0; i--) {
                const arr = arrows[i];
                arr.mesh.position.add(arr.dir.clone().multiplyScalar(arr.velocity));
                arr.life--;

                let hit = false;
                for (let m of monsters) {
                    if (arr.mesh.position.distanceTo(m.mesh.position.clone().add(new THREE.Vector3(0, 0.9, 0))) < 1.0) {
                        m.hp -= 25;
                        hit = true;
                        break;
                    }
                }

                if (hit || arr.life <= 0) {
                    scene.remove(arr.mesh);
                    arrows.splice(i, 1);
                }
            }

            // E. 怪物 AI 追逐與攻擊傷害邏輯
            for (let i = monsters.length - 1; i >= 0; i--) {
                const m = monsters[i];

                if (m.hp <= 0) {
                    scene.remove(m.mesh);
                    monsters.splice(i, 1);
                    player.score++;
                    document.getElementById('score-text').innerText = player.score;
                    continue;
                }

                // 怪物朝玩家靠近
                const toPlayer = player.position.clone().sub(m.mesh.position);
                toPlayer.y = 0; // 保持在地平面
                const dist = toPlayer.length();

                if (dist > 1.1) {
                    toPlayer.normalize();
                    m.mesh.position.add(toPlayer.multiplyScalar(m.speed));
                    m.mesh.lookAt(player.position.x, 0, player.position.z);
                } else {
                    // 怪物攻擊傷害機制
                    if (m.attackCooldown <= 0) {
                        player.hp -= 15;
                        m.attackCooldown = 50;
                        triggerDamage();

                        document.getElementById('hp-text').innerText = Math.max(0, player.hp);
                        document.getElementById('hp-bar').style.width = Math.max(0, player.hp) + '%';

                        if (player.hp <= 0) {
                            player.isDead = true;
                            document.exitPointerLock();
                            document.getElementById('final-score').innerText = player.score;
                            document.getElementById('game-over').style.display = 'block';
                        }
                    }
                }

                if (m.attackCooldown > 0) m.attackCooldown--;
            }

            renderer.render(scene, camera);
        }

        // 重新開始遊戲
        function resetGame() {
            player.hp = 100;
            player.score = 0;
            player.position.set(0, 1.6, 0);
            player.isDead = false;

            monsters.forEach(m => scene.remove(m.mesh));
            monsters.length = 0;

            document.getElementById('hp-text').innerText = 100;
            document.getElementById('hp-bar').style.width = '100%';
            document.getElementById('score-text').innerText = 0;
            document.getElementById('game-over').style.display = 'none';

            document.body.requestPointerLock();
        }

        // 視窗縮放自動調整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
