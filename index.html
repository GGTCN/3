<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CYBER ARCADE - 霓虹卡牌 RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #05051a;
            color: #00ffcc;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ff007f;
            text-shadow: 2px 2px #00ffcc;
            font-size: 20px;
        }
        .cabinet {
            border: 4px solid #ff007f;
            background: #0f0c29;
            max-width: 650px;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 25px #ff007f;
        }
        .status-panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 10px;
            border-bottom: 2px dashed #00ffcc;
            padding-bottom: 10px;
        }
        .monster-area {
            border: 2px solid #00ffcc;
            padding: 15px;
            margin-bottom: 15px;
            background: #1a0033;
        }
        .card-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .card {
            background: #222;
            border: 2px solid #ffff00;
            color: #ffff00;
            padding: 10px;
            width: 90px;
            font-size: 8px;
            cursor: pointer;
            transition: 0.1s;
        }
        .card:hover {
            transform: translateY(-5px);
            background: #ffff00;
            color: #000;
        }
        .btn-gacha {
            background-color: #ff007f;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 0 #99004c;
        }
        .btn-gacha:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #99004c;
        }
        .log-box {
            margin-top: 15px;
            font-size: 9px;
            height: 40px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>🕹️ NEON ABYSS: CYBER CARD RPG</h1>
    <p style="font-size: 10px;">抽卡組牌 ⚡ 擊敗深淵怪物</p>

    <div class="cabinet">
        <div class="status-panel">
            <div>玩家 HP: <span id="playerHp">100</span></div>
            <div>能量: <span id="energy">3</span>/3</div>
            <div>霓虹幣: <span id="coins">50</span></div>
        </div>

        <div class="monster-area">
            <h3 id="monsterName" style="color: #ff007f; font-size: 12px;">【怪獸】賽博暴徒</h3>
            <p>怪物生命值: <span id="monsterHp">50</span> / 50</p>
        </div>

        <div class="log-box" id="gameLog">戰鬥開始！請選擇卡牌攻擊怪物。</div>

        <p style="font-size: 10px; margin-bottom: 5px;">-- 戰鬥手牌 --</p>
        <div class="card-container">
            <div class="card" onclick="useCard('slash')">霓虹斬擊<br><br>傷害: 15<br>耗能: 1</div>
            <div class="card" onclick="useCard('hack')">駭客病毒<br><br>傷害: 25<br>耗能: 2</div>
            <div class="card" onclick="useCard('heal')">奈米修復<br><br>回血: 20<br>耗能: 1</div>
        </div>

        <hr style="border: 1px dashed #ff007f; margin: 20px 0;">

        <button class="btn-gacha" onclick="pullCard()">抽卡轉蛋 (10幣)</button>
    </div>

    <script>
        let playerHp = 100;
        let energy = 3;
        let coins = 50;
        let monsterHp = 50;
        let monsterMaxHp = 50;
        let monsters = [
            { name: "【怪獸】賽博暴徒", hp: 50 },
            { name: "【怪獸】霓虹蜘蛛", hp: 80 },
            { name: "【BOSS】深淵主宰", hp: 150 }
        ];
        let currentMonsterIndex = 0;

        function updateUI() {
            document.getElementById("playerHp").innerText = playerHp;
            document.getElementById("energy").innerText = energy;
            document.getElementById("coins").innerText = coins;
            document.getElementById("monsterHp").innerText = monsterHp;
            document.getElementById("monsterName").innerText = monsters[currentMonsterIndex].name;
        }

        function useCard(type) {
            if (playerHp <= 0) return;
            
            let log = "";
            if (type === 'slash' && energy >= 1) {
                energy -= 1;
                monsterHp -= 15;
                log = "你使用了【霓虹斬擊】，造成 15 點傷害！";
            } else if (type === 'hack' && energy >= 2) {
                energy -= 2;
                monsterHp -= 25;
                log = "你使用了【駭客病毒】，造成 25 點重擊！";
            } else if (type === 'heal' && energy >= 1) {
                energy -= 1;
                playerHp = Math.min(100, playerHp + 20);
                log = "你使用了【奈米修復】，恢復了 20 點生命！";
            } else {
                log = "⚠️ 能量不足！";
                updateUI();
                document.getElementById("gameLog").innerText = log;
                return;
            }

            // 檢查怪物是否死亡
            if (monsterHp <= 0) {
                coins += 20;
                log += `<br>🎉 擊敗 ${monsters[currentMonsterIndex].name}！獲得 20 霓虹幣！`;
                currentMonsterIndex = (currentMonsterIndex + 1) % monsters.length;
                monsterMaxHp += 30;
                monsterHp = monsterMaxHp;
                monsters[currentMonsterIndex].hp = monsterMaxHp;
            } else {
                // 怪物反擊
                let monsterDmg = 10 + Math.floor(Math.random() * 10);
                playerHp -= monsterDmg;
                log += `<br>💥 怪物反擊，對你造成 ${monsterDmg} 點傷害！`;
                energy = Math.min(3, energy + 1); // 回復1點能量
            }

            if (playerHp <= 0) {
                playerHp = 0;
                log = "💀 遊戲結束！你的生命值歸零，請重新投幣。";
            }

            document.getElementById("gameLog").innerText = log;
            updateUI();
        }

        function pullCard() {
            if (coins < 10) {
                document.getElementById("gameLog").innerText = "❌ 霓虹幣不足！請打怪賺取硬幣！";
                return;
            }
            coins -= 10;
            coins += 15; // 抽卡隨贈
            document.getElementById("gameLog").innerText = "🎰 轉蛋成功！獲得稀有賽博裝備卡，額外回饋 15 幣！";
            updateUI();
        }
    </script>

</body>
</html>
