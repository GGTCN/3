<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 2D 冒險 - 大地圖與雙武器版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* UI 介面 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .stats-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #444;
            display: inline-block;
            max-width: 300px;
        }
        .bar-container {
            width: 100%;
            height: 18px;
            background: #333;
            border-radius: 9px;
            margin-top: 6px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .hp-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4d4d, #cc0000);
            transition: width 0.1s ease-out;
        }
        .hotbar {
            align-self: center;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            border-radius: 12px;
            border: 2px solid #555;
        }
        .slot {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #777;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #aaa;
            position: relative;
        }
        .slot.active {
            border-color: #ffe600;
            background: rgba(255, 230, 0, 0.2);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
        }
        .slot-key {
            position: absolute;
            top: 2px;
            left: 5px;
            font-size: 10px;
            color: #888;
        }
        /* 受傷紅框特效 */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease-out;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff3333;
            text-align: center;
            display: none;
            pointer-events: auto;
        }
        #game-over button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        #game-over button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="damage-overlay"></div>
        <div id="ui-layer">
            <div class="stats-panel">
                <div>❤️ 生命值: <span id="hp-text">100</span> / 100</div>
                <div class="bar-container"><div id="hp-bar" class="hp-bar"></div></div>
                <div style="margin-top: 10px;">🎯 擊殺數: <span id="score-text">0</span></div>
            </div>
            <div class="hotbar">
                <div class="slot active" id="slot-1">
                    <span class="slot-key">1</span>
                    ⚔️ 鐵劍
                </div>
                <div class="slot" id="slot-2">
                    <span class="slot-key">2</span>
                    🏹 弓箭
                </div>
            </div>
        </div>
        <div id="game-over">
            <h1>💀 你體力不支倒下了！</h1>
            <p style="margin-top: 10px; color: #aaa;">生存戰績: <span id="final-score">0</span> 隻怪物</p>
            <button onclick="resetGame()">重新開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const damageOverlay = document.getElementById('damage-overlay');

        // 地圖設定（擴大至 3000 x 3000，體驗遼闊感）
        const MAP_SIZE = 3000;
        const GRID_SIZE = 60;

        // 畫布自動縮放
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 按鍵監聽
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === '1') setWeapon('sword');
            if (e.key === '2') setWeapon('bow');
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 滑鼠位置與點擊
        const mouse = { x: 0, y: 0, worldX: 0, worldY: 0, isDown: false };
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mousedown', e => {
            if (e.button === 0) {
                mouse.isDown = true;
                playerAttack();
            }
        });
        window.addEventListener('mouseup', e => { if (e.button === 0) mouse.isDown = false; });

        // 攝影機物件（帶有滑順 Lerp 追蹤）
        const camera = { x: MAP_SIZE / 2, y: MAP_SIZE / 2 };

        // 玩家物件（物理 AABB 碰撞箱）
        const player = {
            x: MAP_SIZE / 2,
            y: MAP_SIZE / 2,
            width: 32,
            height: 32,
            speed: 5,
            hp: 100,
            maxHp: 100,
            activeWeapon: 'sword', // 'sword' 或 'bow'
            attackCooldown: 0,
            swordSwingAngle: 0,
            isSwinging: false,
            score: 0,
            isDead: false
        };

        // 障礙物列表 (樹木與岩石)
        const obstacles = [];
        function generateWorld() {
            obstacles.length = 0;
            // 隨機生成 120 個障礙物
            for (let i = 0; i < 120; i++) {
                const type = Math.random() > 0.4 ? 'tree' : 'rock';
                const size = type === 'tree' ? 50 : 40;
                const ox = Math.random() * (MAP_SIZE - 400) + 200;
                const oy = Math.random() * (MAP_SIZE - 400) + 200;

                // 避開出生點
                if (Math.hypot(ox - player.x, oy - player.y) > 200) {
                    obstacles.push({ x: ox, y: oy, width: size, height: size, type });
                }
            }
        }

        // 怪物與投射物
        const monsters = [];
        const projectiles = [];
        const particles = [];

        function spawnMonster() {
            if (monsters.length >= 25 || player.isDead) return;
            // 在玩家視線外隨機生成
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 500 + 600;
            let mx = player.x + Math.cos(angle) * dist;
            let my = player.y + Math.sin(angle) * dist;

            // 確保不出界
            mx = Math.max(100, Math.min(MAP_SIZE - 100, mx));
            my = Math.max(100, Math.min(MAP_SIZE - 100, my));

            monsters.push({
                x: mx,
                y: my,
                width: 32,
                height: 32,
                speed: 2.2 + Math.random() * 0.8,
                hp: 30,
                maxHp: 30,
                attackCooldown: 0,
                color: '#44aa44' // 經典苦力怕/殭屍綠
            });
        }
        setInterval(spawnMonster, 2000);

        // AABB 矩形碰撞檢測 (Minecraft 碰撞標準)
        function checkAABB(rect1, rect2) {
            return rect1.x - rect1.width/2 < rect2.x + rect2.width/2 &&
                   rect1.x + rect1.width/2 > rect2.x - rect2.width/2 &&
                   rect1.y - rect1.height/2 < rect2.y + rect2.height/2 &&
                   rect1.y + rect1.height/2 > rect2.y - rect2.height/2;
        }

        // Minecraft 風格：滑順沿牆移動邏輯
        function moveWithCollision(entity, vx, vy) {
            // 先嘗試 X 軸移動
            entity.x += vx;
            for (let obs of obstacles) {
                if (checkAABB(entity, obs)) {
                    if (vx > 0) entity.x = obs.x - obs.width/2 - entity.width/2;
                    if (vx < 0) entity.x = obs.x + obs.width/2 + entity.width/2;
                }
            }
            // 再嘗試 Y 軸移動
            entity.y += vy;
            for (let obs of obstacles) {
                if (checkAABB(entity, obs)) {
                    if (vy > 0) entity.y = obs.y - obs.height/2 - entity.height/2;
                    if (vy < 0) entity.y = obs.y + obs.height/2 + entity.height/2;
                }
            }
            // 邊界限制
            entity.x = Math.max(entity.width/2, Math.min(MAP_SIZE - entity.width/2, entity.x));
            entity.y = Math.max(entity.height/2, Math.min(MAP_SIZE - entity.height/2, entity.y));
        }

        // 切換武器
        function setWeapon(type) {
            player.activeWeapon = type;
            document.getElementById('slot-1').classList.toggle('active', type === 'sword');
            document.getElementById('slot-2').classList.toggle('active', type === 'bow');
        }

        // 玩家攻擊發動
        function playerAttack() {
            if (player.attackCooldown > 0 || player.isDead) return;

            const aimAngle = Math.atan2(mouse.worldY - player.y, mouse.worldX - player.x);

            if (player.activeWeapon === 'sword') {
                // 刀：近戰揮砍 (冷卻短、範圍廣)
                player.attackCooldown = 15;
                player.isSwinging = true;
                player.swordSwingAngle = aimAngle - Math.PI / 3;

                // 擊中判定 (扇形近戰範圍)
                monsters.forEach(m => {
                    const dist = Math.hypot(m.x - player.x, m.y - player.y);
                    if (dist < 85) {
                        const angleToMonster = Math.atan2(m.y - player.y, m.x - player.x);
                        let angleDiff = Math.abs(angleToMonster - aimAngle);
                        if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

                        if (angleDiff < Math.PI / 2.5) {
                            m.hp -= 18;
                            // 擊退效果
                            m.x += Math.cos(aimAngle) * 20;
                            m.y += Math.sin(aimAngle) * 20;
                            createParticles(m.x, m.y, '#ff4444', 5);
                        }
                    }
                });
            } else if (player.activeWeapon === 'bow') {
                // 弓：遠程射擊
                player.attackCooldown = 30;
                projectiles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(aimAngle) * 12,
                    vy: Math.sin(aimAngle) * 12,
                    life: 60
                });
            }
        }

        // 擊中粒子特效
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    color,
                    life: 15
                });
            }
        }

        // 觸發受傷效果
        function triggerDamage() {
            damageOverlay.style.opacity = '1';
            setTimeout(() => { damageOverlay.style.opacity = '0'; }, 100);
        }

        // 更新遊戲數據與邏輯
        function update() {
            if (player.isDead) return;

            // 1. 玩家移動輸入
            let moveX = 0;
            let moveY = 0;
            if (keys['w'] || keys['arrowup']) moveY -= 1;
            if (keys['s'] || keys['arrowdown']) moveY += 1;
            if (keys['a'] || keys['arrowleft']) moveX -= 1;
            if (keys['d'] || keys['arrowright']) moveX += 1;

            if (moveX !== 0 && moveY !== 0) {
                moveX *= 0.7071;
                moveY *= 0.7071;
            }
            moveWithCollision(player, moveX * player.speed, moveY * player.speed);

            // 2. 攝影機極致絲滑插值 (Lerp)
            camera.x += (player.x - camera.x) * 0.1;
            camera.y += (player.y - camera.y) * 0.1;

            // 更新世界滑鼠座標
            mouse.worldX = mouse.x - canvas.width / 2 + camera.x;
            mouse.worldY = mouse.y - canvas.height / 2 + camera.y;

            // 3. 武器揮刀動畫與冷卻
            if (player.attackCooldown > 0) player.attackCooldown--;
            if (player.isSwinging) {
                player.swordSwingAngle += 0.2;
                if (player.swordSwingAngle >= Math.atan2(mouse.worldY - player.y, mouse.worldX - player.x) + Math.PI / 3) {
                    player.isSwinging = false;
                }
            }

            // 4. 箭矢更新
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                // 碰撞怪物
                let hit = false;
                for (let m of monsters) {
                    if (checkAABB({ x: p.x, y: p.y, width: 10, height: 10 }, m)) {
                        m.hp -= 25;
                        m.x += p.vx * 0.3;
                        m.y += p.vy * 0.3;
                        createParticles(m.x, m.y, '#999', 6);
                        hit = true;
                        break;
                    }
                }
                // 碰撞障礙物
                if (!hit) {
                    for (let obs of obstacles) {
                        if (checkAABB({ x: p.x, y: p.y, width: 8, height: 8 }, obs)) {
                            hit = true;
                            break;
                        }
                    }
                }
                if (hit || p.life <= 0) projectiles.splice(i, 1);
            }

            // 5. 怪物邏輯與傷害計算
            for (let i = monsters.length - 1; i >= 0; i--) {
                let m = monsters[i];
                if (m.hp <= 0) {
                    createParticles(m.x, m.y, '#44aa44', 12);
                    monsters.splice(i, 1);
                    player.score++;
                    document.getElementById('score-text').innerText = player.score;
                    continue;
                }

                // 怪物朝玩家移動
                const angle = Math.atan2(player.y - m.y, player.x - m.x);
                const mvx = Math.cos(angle) * m.speed;
                const mvy = Math.sin(angle) * m.speed;
                moveWithCollision(m, mvx, mvy);

                // 怪物攻擊玩家（Minecraft 物理接觸傷害）
                if (checkAABB(player, m)) {
                    if (m.attackCooldown <= 0) {
                        player.hp -= 12; // 造成的傷害值
                        m.attackCooldown = 45; // 攻擊冷卻時間
                        triggerDamage();

                        // 玩家被小幅度擊退
                        player.x += Math.cos(angle) * 10;
                        player.y += Math.sin(angle) * 10;

                        // 更新 UI 生命條
                        document.getElementById('hp-text').innerText = Math.max(0, player.hp);
                        document.getElementById('hp-bar').style.width = Math.max(0, player.hp) + '%';

                        if (player.hp <= 0) {
                            player.isDead = true;
                            document.getElementById('final-score').innerText = player.score;
                            document.getElementById('game-over').style.display = 'block';
                        }
                    }
                }
                if (m.attackCooldown > 0) m.attackCooldown--;
            }

            // 6. 粒子效果更新
            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.life--;
                if (pt.life <= 0) particles.splice(i, 1);
            }
        }

        // 渲染畫面
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // 視角置中跟隨
            ctx.translate(canvas.width / 2 - camera.x, canvas.height / 2 - camera.y);

            // A. 繪製草地背景與網格線
            ctx.fillStyle = '#4a7c59';
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 2;
            for (let x = 0; x < MAP_SIZE; x += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, MAP_SIZE); ctx.stroke();
            }
            for (let y = 0; y < MAP_SIZE; y += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(MAP_SIZE, y); ctx.stroke();
            }

            // 地圖邊界牆
            ctx.strokeStyle = '#ff3333';
            ctx.lineWidth = 8;
            ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

            // B. 繪製障礙物 (樹木/岩石)
            obstacles.forEach(obs => {
                if (obs.type === 'tree') {
                    // 樹陰影
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y + 10, obs.width/2, 0, Math.PI * 2);
                    ctx.fill();
                    // 樹幹與樹冠
                    ctx.fillStyle = '#2d5a27';
                    ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
                    ctx.fillStyle = '#38761d';
                    ctx.fillRect(obs.x - obs.width/2 + 5, obs.y - obs.height/2 + 5, obs.width - 10, obs.height - 10);
                } else {
                    // 岩石
                    ctx.fillStyle = '#777777';
                    ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
                    ctx.fillStyle = '#999999';
                    ctx.fillRect(obs.x - obs.width/2 + 4, obs.y - obs.height/2 + 4, obs.width - 8, obs.height - 8);
                }
            });

            // C. 繪製怪物
            monsters.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.fillRect(m.x - m.width/2, m.y - m.height/2, m.width, m.height);
                // 怪物眼睛 (Minecraft 苦力怕風格臉孔)
                ctx.fillStyle = '#000';
                ctx.fillRect(m.x - 10, m.y - 8, 6, 6);
                ctx.fillRect(m.x + 4, m.y - 8, 6, 6);
                ctx.fillRect(m.x - 4, m.y, 8, 10);

                // 怪物血條
                ctx.fillStyle = '#333';
                ctx.fillRect(m.x - 20, m.y - 25, 40, 6);
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(m.x - 20, m.y - 25, (m.hp / m.maxHp) * 40, 6);
            });

            // D. 繪製投射物 (箭矢)
            ctx.fillStyle = '#fff';
            projectiles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // E. 繪製玩家
            if (!player.isDead) {
                // 玩家本體 (史蒂夫風格)
                ctx.fillStyle = '#00aaff';
                ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height);

                // 瞄準角度 calculation
                const aimAngle = Math.atan2(mouse.worldY - player.y, mouse.worldX - player.x);

                // 武器繪製
                ctx.save();
                ctx.translate(player.x, player.y);
                if (player.activeWeapon === 'sword') {
                    // 刀：繪製揮舞動作或握持動作
                    const swingAngle = player.isSwinging ? player.swordSwingAngle : aimAngle;
                    ctx.rotate(swingAngle);
                    ctx.fillStyle = '#ddd'; // 劍身
                    ctx.fillRect(15, -3, 30, 6);
                    ctx.fillStyle = '#8b4513'; // 劍柄
                    ctx.fillRect(10, -5, 5, 10);

                    // 刀揮砍光軌特效
                    if (player.isSwinging) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        ctx.beginPath();
                        ctx.arc(0, 0, 50, -Math.PI/4, Math.PI/4);
                        ctx.lineTo(0,0);
                        ctx.fill();
                    }
                } else if (player.activeWeapon === 'bow') {
                    // 弓箭
                    ctx.rotate(aimAngle);
                    ctx.strokeStyle = '#8b4513';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(15, 0, 15, -Math.PI/2, Math.PI/2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // F. 粒子效果
            particles.forEach(pt => {
                ctx.fillStyle = pt.color;
                ctx.fillRect(pt.x, pt.y, 4, 4);
            });

            ctx.restore();
        }

        // 重新開始遊戲
        function resetGame() {
            player.hp = 100;
            player.score = 0;
            player.x = MAP_SIZE / 2;
            player.y = MAP_SIZE / 2;
            player.isDead = false;
            monsters.length = 0;
            projectiles.length = 0;

            document.getElementById('hp-text').innerText = 100;
            document.getElementById('hp-bar').style.width = '100%';
            document.getElementById('score-text').innerText = 0;
            document.getElementById('game-over').style.display = 'none';

            generateWorld();
        }

        // 遊戲主循環 (極致 60 FPS)
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // 初始化遊戲
        generateWorld();
        gameLoop();
    </script>
</body>
</html>
