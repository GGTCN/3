<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CYBER ARCADE - 3D 動作 RPG 戰域</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #030310;
            color: #00ffcc;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(15, 12, 41, 0.9);
            border: 3px solid #ff007f;
            padding: 12px 20px;
            box-shadow: 0 0 20px #ff007f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            font-size: 11px;
        }
        .hud-group {
            display: flex;
            gap: 15px;
        }
        .weapon-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
            background: rgba(10, 5, 25, 0.85);
            padding: 10px 15px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
        }
        .weapon-btn {
            background-color: #1a0033;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 10px 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            cursor: pointer;
            transition: 0.2s;
        }
        .weapon-btn.active {
            background-color: #00ffcc;
            color: #000;
            box-shadow: 0 0 10px #00ffcc;
        }
        .weapon-btn:hover {
            background-color: #ff007f;
            border-color: #ff007f;
            color: #fff;
        }
        #instructions {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #ffff00;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
    <!-- 引入 Three.js 3D 引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-group">
            <div>血量: <span id="playerHp" style="color:#ff007f;">100</span></div>
            <div>等級: <span id="playerLv">1</span></div>
            <div>霓虹幣: <span id="coins" style="color:#ffff00;">50</span></div>
        </div>
        <div id="battleLog" style="font-size: 9px; color: #ffff00;">使用 W A S D 移動，點擊方塊怪獸攻擊！</div>
    </div>

    <div id="instructions">控制方式：W A S D 移動 | 滑鼠點擊方塊怪獸進行攻擊 | 下方切換武器</div>

    <div class="weapon-panel">
        <button class="weapon-btn active" id="wBtn0" onclick="switchWeapon(0)">⚡ 霓虹雷刃 (近戰)</button>
        <button class="weapon-btn" id="wBtn1" onclick="switchWeapon(1)">🔥 離子脈衝槍 (遠距)</button>
        <button class="weapon-btn" id="wBtn2" onclick="switchWeapon(2)">🛡️ 虛擬重劍 (暴擊)</button>
    </div>

    <script>
        // --- 1. 遊戲核心狀態 ---
        let playerHp = 100;
        let playerLv = 1;
        let coins = 50;
        let currentWeapon = 0; // 0: 雷刃, 1: 脈衝槍, 2: 重劍
        
        const weaponsData = [
            { name: "霓虹雷刃", damage: 25, range: 4.5, color: 0x00ffcc },
            { name: "離子脈衝槍", damage: 15, range: 10.0, color: 0xff007f },
            { name: "虛擬重劍", damage: 50, range: 3.0, color: 0xffff00 }
        ];

        // 移動按鍵記錄
        const keys = { w: false, a: false, s: false, d: false };

        // --- 2. Three.js 場景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030310);
        scene.fog = new THREE.FogExp2(0x030310, 0.035);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 燈光：賽博朋克高對比光影
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff007f, 3, 30);
        pointLight.position.set(0, 8, 2);
        scene.add(pointLight);

        const blueLight = new THREE.PointLight(0x00ffcc, 2, 30);
        blueLight.position.set(0, -5, -5);
        scene.add(blueLight);

        // 地板網格
        const gridHelper = new THREE.GridHelper(60, 30, 0xff007f, 0x00ffcc);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // --- 3. 建立玩家與怪物 3D 模型 ---

        // 玩家角色 (小綠方塊搭配武器光環)
        const playerGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const playerMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, 
            roughness: 0.2, 
            metalness: 0.8,
            emissive: 0x004433 
        });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 0, 4);
        scene.add(player);

        // 你最愛的【超強發光方塊怪獸】
        let monsters = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function spawnMonster() {
            // 隨機發光材質 (高亮金屬質感 + 自發光發色)
            const colors = [0xff007f, 0xffaa00, 0x9900ff, 0x00ffff];
            const randColor = colors[Math.floor(Math.random() * colors.length)];

            const monsterGeo = new THREE.BoxGeometry(2, 2, 2);
            const monsterMat = new THREE.MeshStandardMaterial({ 
                color: randColor, 
                roughness: 0.1, 
                metalness: 0.9,
                emissive: randColor,
                emissiveIntensity: 0.6 // 超強發光效果！
            });
            const monsterMesh = new THREE.Mesh(monsterGeo, monsterMat);
            
            // 隨機生成在前方視野內
            const rx = (Math.random() - 0.5) * 16;
            const rz = -Math.random() * 12 - 2;
            monsterMesh.position.set(rx, 0, rz);
            scene.add(monsterMesh);

            const monsterObj = {
                mesh: monsterMesh,
                hp: 50 + playerLv * 15,
                maxHp: 50 + playerLv * 15,
                rotSpeedX: (Math.random() - 0.5) * 0.04,
                rotSpeedY: (Math.random() - 0.5) * 0.04
            };
            monsters.push(monsterObj);
        }

        // 初始化生成 3 隻怪獸
        for (let i = 0; i < 3; i++) {
            spawnMonster();
        }

        // --- 4. 鍵盤與滑鼠互動事件 ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        // 點擊打怪核心邏輯
        window.addEventListener('click', (e) => {
            // 計算滑鼠在 3D 空間中的射線
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // 抓取所有怪物的 mesh
            const monsterMeshes = monsters.map(m => m.mesh);
            const intersects = raycaster.intersectObjects(monsterMeshes);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const targetMonster = monsters.find(m => m.mesh === hitMesh);

                if (targetMonster) {
                    // 計算玩家與怪物的距離
                    const dist = player.position.distanceTo(targetMonster.mesh.position);
                    const weapon = weaponsData[currentWeapon];

                    if (dist <= weapon.range) {
                        // 攻擊有效！造成傷害
                        targetMonster.hp -= weapon.damage;
                        
                        // 擊中閃爍特效
                        targetMonster.mesh.material.emissive.setHex(0xffffff);
                        setTimeout(() => {
                            targetMonster.mesh.material.emissive.setHex(weapon.color);
                        }, 120);

                        document.getElementById("battleLog").innerHTML = `⚔️ 使用【${weapon.name}】命中怪獸，造成 ${weapon.damage} 點傷害！`;

                        // 檢查怪物是否死亡
                        if (targetMonster.hp <= 0) {
                            scene.remove(targetMonster.mesh);
                            monsters = monsters.filter(m => m !== targetMonster);
                            coins += 25;
                            document.getElementById("battleLog").innerHTML = `🎉 擊敗發光方塊！獲得 25 霓虹幣！`;
                            updateHUD();

                            // 補生成新怪獸
                            setTimeout(spawnMonster, 1000);
                        }
                    } else {
                        document.getElementById("battleLog").innerHTML = `⚠️ 距離太遠！請使用 W A S D 靠近怪獸再攻擊！`;
                    }
                }
            }
        });

        function switchWeapon(index) {
            currentWeapon = index;
            document.querySelectorAll('.weapon-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === index);
            });
            document.getElementById("battleLog").innerHTML = `🔄 已切換武器：【${weaponsData[index].name}】(射程: ${weaponsData[index].range})`;
        }

        // --- 5. 遊戲主循環 (Animation Loop) ---
        function animate() {
            requestAnimationFrame(animate);

            // 玩家移動處理 (W A S D)
            const speed = 0.08;
            if (keys.w && player.position.z > -8) player.position.z -= speed;
            if (keys.s && player.position.z < 8) player.position.z += speed;
            if (keys.a && player.position.x > -10) player.position.x -= speed;
            if (keys.d && player.position.x < 10) player.position.x += speed;

            // 讓攝影機隨玩家平滑跟隨
            camera.position.x += (player.position.x - camera.position.x) * 0.05;
            camera.lookAt(player.position.x, 0, player.position.z - 2);

            // 發光方塊怪獸持續自轉與浮動（你最愛的質感）
            monsters.forEach(m => {
                m.mesh.rotation.x += m.rotSpeedX;
                m.mesh.rotation.y += m.rotSpeedY;
                m.mesh.position.y = Math.sin(Date.now() * 0.003 + m.mesh.position.x) * 0.4;
            });

            renderer.render(scene, camera);
        }
        animate();

        // 視窗自適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUD() {
            document.getElementById("playerHp").innerText = playerHp;
            document.getElementById("playerLv").innerText = playerLv;
            document.getElementById("coins").innerText = coins;
        }
    </script>
</body>
</html>
