<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CYBER ARCADE - 方塊塔防</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(15, 12, 41, 0.9);
            border: 3px solid #ffff00;
            padding: 15px;
            box-shadow: 0 0 15px #ffff00;
            pointer-events: none;
            text-align: left;
        }
        .hud-text { font-size: 12px; margin-bottom: 10px; line-height: 1.5; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .arcade-btn {
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 6px 0 #008866;
            transition: 0.1s;
        }
        .arcade-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #008866;
        }
        .btn-build { background-color: #ffff00; box-shadow: 0 6px 0 #b3b300; }
        .btn-build:active { box-shadow: 0 0 0 #b3b300; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-text">生命: <span id="life" style="color: #ff007f;">20</span></div>
        <div class="hud-text">霓虹幣: <span id="coins">100</span></div>
        <div class="hud-text">波次: <span id="wave">1</span></div>
        <div class="hud-text" id="gameStatus" style="font-size: 10px; color: #fff;">準備開始...</div>
    </div>

    <div class="controls">
        <button class="arcade-btn btn-build" onclick="buildTower()">建造電磁塔 (50幣)</button>
        <button class="arcade-btn" onclick="startNextWave()">下一波方塊</button>
    </div>

    <script>
        // --- 3D 場景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030303);
        scene.fog = new THREE.FogExp2(0x030303, 0.02);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 開啟陰影
        document.body.appendChild(renderer.domElement);

        // 燈光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 地圖網格
        const gridHelper = new THREE.GridHelper(40, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // --- 塔防遊戲邏輯變數 ---
        let life = 20;
        let coins = 100;
        let wave = 1;
        let towers = [];
        let enemies = [];
        let isWaveInProgress = false;
        
        // 定義敵人路徑 (簡單的直線從遠到近)
        const pathPoints = [
            new THREE.Vector3(0, 0, -20),
            new THREE.Vector3(0, 0, 20)
        ];

        // --- 3D 物件工廠 ---

        // 1. 建立方塊敵人 (你喜歡的那個！)
        function createEnemy() {
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xff007f, 
                emissive: 0x550022,
                roughness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.position.copy(pathPoints[0]);
            
            const enemyObj = {
                mesh: mesh,
                hp: 50 + wave * 20, // 隨波次變強
                maxHp: 50 + wave * 20,
                pathIndex: 0,
                speed: 0.1 + (wave * 0.01),
                uid: Date.now()
            };
            
            scene.add(mesh);
            enemies.push(enemyObj);
        }

        // 2. 建立防禦塔 (圓柱體+小球)
        function createTowerMesh(x, z) {
            const towerGroup = new THREE.Group();
            
            // 底座
            const baseGeo = new THREE.CylinderGeometry(1, 1.2, 1, 16);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x00cc99, metalness: 0.7 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.5;
            base.castShadow = true;
            towerGroup.add(base);

            // 砲塔
            const headGeo = new THREE.SphereGeometry(0.7, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x999900 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.8;
            head.castShadow = true;
            towerGroup.add(head);

            towerGroup.position.set(x, 0, z);
            scene.add(towerGroup);
            
            return {
                group: towerGroup,
                head: head,
                range: 8,
                damage: 10,
                cooldown: 0,
                target: null
            };
        }

        // --- 遊戲互動函數 ---

        // 建造塔 (點擊按鈕觸發)
        function buildTower() {
            if (coins < 50) {
                document.getElementById("gameStatus").innerText = "⚠️ 霓虹幣不足！";
                return;
            }
            coins -= 50;
            updateHUD();
            
            // 隨機位置建造在網格上 (簡化版)
            const x = Math.floor(Math.random() * 5) * 4 - 8; // -8, -4, 0, 4, 8
            const z = Math.floor(Math.random() * 5) * 4 - 8; 
            
            const tower = createTowerMesh(x, z);
            towers.push(tower);
            document.getElementById("gameStatus").innerText = "✅ 電磁塔建造完成！";
        }

        // 開始下一波
        function startNextWave() {
            if (isWaveInProgress) return;
            isWaveInProgress = true;
            wave += 1;
            document.getElementById("gameStatus").innerText = `⚡ 第 ${wave} 波方塊入侵開始！`;
            updateHUD();
            
            // 生成這一波的敵人 (例如：5個)
            let enemyCount = 0;
            const spawnInterval = setInterval(() => {
                createEnemy();
                enemyCount++;
                if (enemyCount >= 5 + wave) {
                    clearInterval(spawnInterval);
                }
            }, 1000);
        }

        // --- 核心遊戲循環 (動畫+邏輯) ---
        function animate() {
            requestAnimationFrame(animate);

            // --- 1. 敵人移動邏輯 ---
            const enemiesToRemove = [];
            enemies.forEach(enemy => {
                const targetPoint = pathPoints[1]; // 終點
                const direction = new THREE.Vector3().subVectors(targetPoint, enemy.mesh.position).normalize();
                enemy.mesh.position.add(direction.multiplyScalar(enemy.speed));
                
                // 敵人旋轉效果 (你喜歡的特性)
                enemy.mesh.rotation.x += 0.02;
                enemy.mesh.rotation.y += 0.03;

                // 到達終點判定
                if (enemy.mesh.position.distanceTo(targetPoint) < 0.5) {
                    life -= 1;
                    enemiesToRemove.push(enemy);
                    updateHUD();
                }
            });

            // --- 2. 防禦塔 AI 邏輯 ---
            towers.forEach(tower => {
                // 尋找範圍內最近的敵人
                let nearestEnemy = null;
                let minDistance = tower.range;

                enemies.forEach(enemy => {
                    const dist = tower.group.position.distanceTo(enemy.mesh.position);
                    if (dist < minDistance) {
                        nearestEnemy = enemy;
                        minDistance = dist;
                    }
                });

                // 攻擊邏輯
                tower.target = nearestEnemy;
                if (tower.target && tower.cooldown <= 0) {
                    // 瞄準敵人
                    tower.head.lookAt(tower.target.mesh.position);
                    
                    // 造成傷害
                    tower.target.hp -= tower.damage;
                    
                    // 視覺回饋：發射光束 (簡單用紅色發光表示)
                    const originalEmit = tower.target.mesh.material.emissive.getHex();
                    tower.target.mesh.material.emissive.setHex(0xffffff); // 擊中變白
                    setTimeout(() => {
                        if(tower.target) tower.target.mesh.material.emissive.setHex(originalEmit);
                    }, 50);

                    // 重置攻擊冷卻
                    tower.cooldown = 20; // 幀數
                } else if (tower.cooldown > 0) {
                    tower.cooldown -= 1;
                }
            });

            // --- 3. 清理陣列 ---
            // 移除死掉的敵人
            enemies.filter(e => e.hp <= 0).forEach(deadEnemy => {
                coins += 25; // 擊殺獎勵
                updateHUD();
                enemiesToRemove.push(deadEnemy);
            });
            
            // 執行實際刪除
            enemiesToRemove.forEach(enemyToRemove => {
                scene.remove(enemyToRemove.mesh);
                const index = enemies.indexOf(enemyToRemove);
                if (index > -1) {
                    enemies.splice(index, 1);
                }
            });

            // 檢查遊戲結束
            if (life <= 0 && isWaveInProgress) {
                isWaveInProgress = false;
                document.getElementById("gameStatus").innerText = "💀 遊戲結束！方塊佔領了深淵。";
            } else if (enemies.length === 0 && isWaveInProgress) {
                // 所有敵人都清空了，波次結束
                isWaveInProgress = false;
                document.getElementById("gameStatus").innerText = "✅ 本波防守成功！準備迎戰下一波。";
            }

            renderer.render(scene, camera);
        }
        animate();

        // 視窗縮放適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUD() {
            document.getElementById("life").innerText = life;
            document.getElementById("coins").innerText = coins;
            document.getElementById("wave").innerText = wave;
        }
    </script>
</body>
</html>
