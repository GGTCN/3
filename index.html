<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CYBER ARCADE - 像素方塊刀劍 RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #1a1a2e;
            color: #00ffcc;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(15, 12, 41, 0.95);
            border: 3px solid #ff007f;
            padding: 12px 20px;
            box-shadow: 0 0 20px #ff007f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            font-size: 11px;
        }
        .hud-group {
            display: flex;
            gap: 15px;
        }
        .blade-panel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
            background: rgba(10, 5, 25, 0.9);
            padding: 10px 15px;
            border: 2px solid #ffff00;
            box-shadow: 0 0 15px #ffff00;
        }
        .blade-btn {
            background-color: #222;
            color: #ffff00;
            border: 2px solid #ffff00;
            padding: 10px 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            cursor: pointer;
            transition: 0.1s;
        }
        .blade-btn.active {
            background-color: #ffff00;
            color: #000;
            box-shadow: 0 0 10px #ffff00;
        }
        .blade-btn:hover {
            background-color: #ff007f;
            border-color: #ff007f;
            color: #fff;
        }
        #instructions {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #00ffcc;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
    <!-- 引入 Three.js 3D 引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-group">
            <div>血量: <span id="playerHp" style="color:#ff007f;">100</span></div>
            <div>擊殺: <span id="killCount">0</span></div>
            <div>方塊寶石: <span id="gems" style="color:#ffff00;">0</span></div>
        </div>
        <div id="battleLog" style="font-size: 9px; color: #ffff00;">使用 W A S D 移動，點擊方塊怪物揮刀砍殺！</div>
    </div>

    <div id="instructions">控制方式：W A S D 移動角色 | 滑鼠點擊方塊怪進行刀劍攻擊 | 下方切換刀具</div>

    <div class="blade-panel">
        <button class="blade-btn active" id="bBtn0" onclick="switchBlade(0)">⚔️ 像素方塊太刀 (平衡)</button>
        <button class="blade-btn" id="bBtn1" onclick="switchBlade(1)">⚡ 電磁光刃 (高傷)</button>
        <button class="blade-btn" id="bBtn2" onclick="switchBlade(2)">🔥 烈焰巨劍 (範圍)</button>
    </div>

    <script>
        // --- 1. 遊戲核心狀態 ---
        let playerHp = 100;
        let killCount = 0;
        let gems = 0;
        let currentBlade = 0; // 0: 太刀, 1: 光刃, 2: 巨劍
        
        const bladesData = [
            { name: "方塊太刀", damage: 30, range: 4.0, color: 0x00ffcc },
            { name: "電磁光刃", damage: 45, range: 4.5, color: 0x00ffff },
            { name: "烈焰巨劍", damage: 70, range: 3.5, color: 0xff007f }
        ];

        const keys = { w: false, a: false, s: false, d: false };

        // --- 2. Three.js 場景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.04);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false }); // 關閉反鋸齒以保留完美像素風
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 燈光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 方塊世界地面 (Voxel Grid 地板)
        const gridHelper = new THREE.GridHelper(40, 20, 0xff007f, 0x444466);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // --- 3. 建立麥塊風格角色與方塊怪獸 ---

        // 玩家 (方塊人造型)
        const playerGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(1, 1.4, 0.8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, roughness: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.7;
        playerGroup.add(body);

        // 玩家頭部
        const headGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.8 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.6;
        playerGroup.add(head);

        playerGroup.position.set(0, 0, 3);
        scene.add(playerGroup);

        // 方塊怪獸群 (像素殭屍 / 方塊怪)
        let monsters = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function spawnVoxelMonster() {
            // 方塊怪獸本體 (由方塊堆疊)
            const monsterGroup = new THREE.Group();
            
            const mBodyGeo = new THREE.BoxGeometry(1.2, 1.5, 1.2);
            const mColor = Math.random() > 0.5 ? 0x00cc44 : 0xaa00aa; // 綠色方塊怪或紫色方塊怪
            const mMat = new THREE.MeshStandardMaterial({ color: mColor, roughness: 0.7 });
            const mBody = new THREE.Mesh(mBodyGeo, mMat);
            mBody.position.y = 0.75;
            monsterGroup.add(mBody);

            const mHeadGeo = new THREE.BoxGeometry(1, 1, 1);
            const mHead = new THREE.Mesh(mHeadGeo, mMat);
            mHead.position.y = 1.7;
            monsterGroup.add(mHead);

            // 隨機生成在前方
            const rx = (Math.random() - 0.5) * 14;
            const rz = -Math.random() * 12 - 2;
            monsterGroup.position.set(rx, 0, rz);
            scene.add(monsterGroup);

            monsters.push({
                group: monsterGroup,
                mesh: mBody,
                hp: 60,
                maxHp: 60,
                speed: 0.025 + Math.random() * 0.015
            });
        }

        // 初始化生成 4 隻方塊怪
        for (let i = 0; i < 4; i++) {
            spawnVoxelMonster();
        }

        // --- 4. 鍵盤與滑鼠互動事件 ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        // 點擊揮刀砍怪
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // 收集所有怪獸的身體網格進行點擊判定
            const monsterMeshes = monsters.map(m => m.mesh);
            const intersects = raycaster.intersectObjects(monsterMeshes);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const targetMonster = monsters.find(m => m.mesh === hitMesh);

                if (targetMonster) {
                    const dist = playerGroup.position.distanceTo(targetMonster.group.position);
                    const blade = bladesData[currentBlade];

                    if (dist <= blade.range) {
                        // 砍擊命中！
                        targetMonster.hp -= blade.damage;
                        
                        // 砍擊視覺回饋 (怪獸閃爍白色)
                        targetMonster.mesh.material.color.setHex(0xffffff);
                        setTimeout(() => {
                            targetMonster.mesh.material.color.setHex(0x00cc44);
                        }, 120);

                        document.getElementById("battleLog").innerHTML = `🗡️ 使用【${blade.name}】狠狠砍擊方塊怪，造成 ${blade.damage} 傷害！`;

                        // 檢查怪獸是否被擊殺
                        if (targetMonster.hp <= 0) {
                            scene.remove(targetMonster.group);
                            monsters = monsters.filter(m => m !== targetMonster);
                            killCount++;
                            gems += 15;
                            document.getElementById("battleLog").innerHTML = `🎉 成功斬殺方塊怪獸！獲得 15 方塊寶石！`;
                            updateHUD();

                            // 補充新怪獸
                            setTimeout(spawnVoxelMonster, 1200);
                        }
                    } else {
                        document.getElementById("battleLog").innerHTML = `⚠️ 距離太遠！請用 W A S D 走近方塊怪再揮刀！`;
                    }
                }
            }
        });

        function switchBlade(index) {
            currentBlade = index;
            document.querySelectorAll('.blade-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === index);
            });
            document.getElementById("battleLog").innerHTML = `⚔️ 已切換武器：【${bladesData[index].name}】(傷害: ${bladesData[index].damage})`;
        }

        // --- 5. 遊戲主循環 ---
        function animate() {
            requestAnimationFrame(animate);

            // 玩家移動 (W A S D)
            const speed = 0.07;
            if (keys.w && playerGroup.position.z > -8) playerGroup.position.z -= speed;
            if (keys.s && playerGroup.position.z < 8) playerGroup.position.z += speed;
            if (keys.a && playerGroup.position.x > -10) playerGroup.position.x -= speed;
            if (keys.d && playerGroup.position.x < 10) playerGroup.position.x += speed;

            // 攝影機平滑跟隨玩家
            camera.position.x += (playerGroup.position.x - camera.position.x) * 0.05;
            camera.lookAt(playerGroup.position.x, 0, playerGroup.position.z - 2);

            // 方塊怪獸緩慢朝玩家移動
            monsters.forEach(m => {
                const dir = new THREE.Vector3().subVectors(playerGroup.position, m.group.position);
                dir.y = 0;
                dir.normalize();
                m.group.position.add(dir.multiplyScalar(m.speed));

                // 方塊怪簡單的上下浮動步態
                m.group.position.y = Math.sin(Date.now() * 0.01 + m.group.position.x) * 0.15;
            });

            renderer.render(scene, camera);
        }
        animate();

        // 視窗自適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUD() {
            document.getElementById("playerHp").innerText = playerHp;
            document.getElementById("killCount").innerText = killCount;
            document.getElementById("gems").innerText = gems;
        }
    </script>
</body>
</html>
