<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft FPS - 專業沙盒生存版 (已修復版)</title>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; font-family: 'Consolas', 'Courier New', monospace; user-select: none; background: #000; }
        
        /* Minecraft 風格 UI HUD */
        #hud {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; align-items: center; z-index: 10;
            background: rgba(0, 0, 0, 0.6); padding: 12px 24px; border: 3px solid #3c3c3c;
            box-shadow: inset 0 0 10px #000, 0 4px 10px rgba(0,0,0,0.5); border-radius: 4px; color: #fff;
        }
        .hud-item { font-size: 18px; font-weight: bold; text-shadow: 2px 2px 0px #000; display: flex; align-items: center; gap: 8px; }
        
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(10, 10, 10, 0.9); padding: 30px 50px;
            border-radius: 4px; text-align: center; cursor: pointer; z-index: 30;
            border: 4px solid #555; box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
        #instructions h2 { color: #55ff55; text-shadow: 2px 2px #00aa00; margin-top: 0; }
        
        /* 準心 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.85); box-shadow: 0 0 2px #000; }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }
        
        #hitmarker {
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
            transform: translate(-50%, -50%) rotate(45deg); pointer-events: none; z-index: 10; opacity: 0;
            transition: opacity 0.05s;
        }
        #hitmarker::before, #hitmarker::after { content: ''; position: absolute; background: #ff3333; }
        #hitmarker::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #hitmarker::after { top: 0; left: 11px; width: 2px; height: 24px; }

        /* 手機控制按鈕 */
        .mobile-btn {
            position: absolute; width: 70px; height: 70px; background: rgba(0, 0, 0, 0.5);
            border: 2px solid #888; border-radius: 8px; color: white;
            font-size: 14px; font-weight: bold; display: flex; justify-content: center;
            align-items: center; z-index: 20; text-shadow: 1px 1px #000;
        }
        .mobile-btn:active { background: rgba(255, 255, 255, 0.3); }
        #btn-fire { bottom: 30px; right: 30px; width: 85px; height: 85px; background: rgba(180, 40, 40, 0.6); border-color: #ff5555; }
        #btn-ads { bottom: 130px; right: 30px; }
        #btn-reload { bottom: 210px; right: 30px; }
        #btn-jump { bottom: 30px; right: 135px; }
        
        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px;
            z-index: 20; display: none;
        }
        #joystick-base {
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4);
            border: 2px solid #666; border-radius: 50%; position: relative;
        }
        #joystick-stick {
            width: 40px; height: 40px; background: rgba(255, 255, 255, 0.6);
            border-radius: 50%; position: absolute; top: 40px; left: 40px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item" style="color: #ff5555;">❤ 生命: <span id="hp">100</span></div>
        <div class="hud-item" style="color: #ffff55;">⚡ 擊殺: <span id="kills">0</span></div>
        <div class="hud-item" style="color: #55ffff;">🔫 彈藥: <span id="ammo">30</span>/<span id="reserve">120</span></div>
    </div>

    <div id="instructions">
        <h2>MINECRAFT FPS 生存沙盒</h2>
        <p><b>PC 操控:</b> WASD 移動 | 空格 跳躍 | 左鍵 射擊 | 右鍵 瞄準 | R 換彈</p>
        <p><b>手機操控:</b> 左搖桿移動 | 右畫面滑動旋轉 | 專屬按鈕</p>
        <p style="color: #aaa; font-size: 13px; margin-top: 15px;">[ 點擊畫面開始遊戲 ]</p>
    </div>

    <div id="crosshair"></div>
    <div id="hitmarker"></div>

    <div id="joystick-zone">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
    </div>
    <div id="btn-fire" class="mobile-btn" style="display:none;">開火</div>
    <div id="btn-ads" class="mobile-btn" style="display:none;">瞄準</div>
    <div id="btn-reload" class="mobile-btn" style="display:none;">換彈</div>
    <div id="btn-jump" class="mobile-btn" style="display:none;">跳躍</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 800;
        
        // ---------------------------------------------------------
        // 1. 程序化生成 Minecraft 貼圖
        // ---------------------------------------------------------
        function createPixelTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');

            if (type === 'grass_top') {
                ctx.fillStyle = '#5b8731'; ctx.fillRect(0, 0, 16, 16);
                for(let i=0; i<30; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#4c7824' : '#689639';
                    ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
                }
            } else if (type === 'grass_side') {
                ctx.fillStyle = '#866043'; ctx.fillRect(0, 0, 16, 16);
                for(let i=0; i<40; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#735135' : '#976d4d';
                    ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
                }
                ctx.fillStyle = '#5b8731'; ctx.fillRect(0, 0, 16, 4);
                for(let i=0; i<16; i++) {
                    let h = Math.floor(Math.random()*3);
                    ctx.fillRect(i, 3, 1, h);
                }
            } else if (type === 'dirt') {
                ctx.fillStyle = '#866043'; ctx.fillRect(0, 0, 16, 16);
                for(let i=0; i<50; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#735135' : '#976d4d';
                    ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
                }
            } else if (type === 'stone') {
                ctx.fillStyle = '#737373'; ctx.fillRect(0, 0, 16, 16);
                for(let i=0; i<50; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#616161' : '#858585';
                    ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
                }
            } else if (type === 'zombie_face') {
                ctx.fillStyle = '#255229'; ctx.fillRect(0, 0, 16, 16);
                ctx.fillStyle = '#000000'; ctx.fillRect(2, 6, 4, 2); ctx.fillRect(10, 6, 4, 2);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(4, 6, 2, 2); ctx.fillRect(10, 6, 2, 2);
                ctx.fillStyle = '#17361a'; ctx.fillRect(6, 10, 4, 3);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const texGrassTop = createPixelTexture('grass_top');
        const texGrassSide = createPixelTexture('grass_side');
        const texDirt = createPixelTexture('dirt');
        const texStone = createPixelTexture('stone');
        const texZombieFace = createPixelTexture('zombie_face');

        const matGrassBlock = [
            new THREE.MeshLambertMaterial({ map: texGrassSide }),
            new THREE.MeshLambertMaterial({ map: texGrassSide }),
            new THREE.MeshLambertMaterial({ map: texGrassTop }),
            new THREE.MeshLambertMaterial({ map: texDirt }),
            new THREE.MeshLambertMaterial({ map: texGrassSide }),
            new THREE.MeshLambertMaterial({ map: texGrassSide })
        ];
        const matStoneBlock = new THREE.MeshLambertMaterial({ map: texStone });

        // ---------------------------------------------------------
        // 2. 音效生成器 (修復 AudioContext 初始化防擋)
        // ---------------------------------------------------------
        let audioCtx = null;
        function playSound(freq, duration, type='sawtooth', volume=0.2) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        // ---------------------------------------------------------
        // 3. 3D 場景與光影渲染
        // ---------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee);
        scene.fog = new THREE.FogExp2(0x7ec0ee, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
        dirLight.position.set(40, 60, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // ---------------------------------------------------------
        // 4. 地形生成與完整 AABB 碰撞箱系統
        // ---------------------------------------------------------
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const terrainBlocks = [];
        const colliders = []; // 用於實體碰撞檢測
        const MAP_SIZE = 24;

        for (let x = -MAP_SIZE; x <= MAP_SIZE; x++) {
            for (let z = -MAP_SIZE; z <= MAP_SIZE; z++) {
                // 地表草地 (Y=0)
                const block = new THREE.Mesh(boxGeo, matGrassBlock);
                block.position.set(x, 0, z);
                block.receiveShadow = true; block.castShadow = true;
                scene.add(block); terrainBlocks.push(block);

                // 石頭障礙 (Y=1~3)
                if (Math.random() < 0.02 && Math.abs(x) > 4 && Math.abs(z) > 4) {
                    for(let h = 1; h <= 3; h++) {
                        const sBlock = new THREE.Mesh(boxGeo, matStoneBlock);
                        sBlock.position.set(x, h, z);
                        sBlock.receiveShadow = true; sBlock.castShadow = true;
                        scene.add(sBlock); 
                        terrainBlocks.push(sBlock);
                        colliders.push(new THREE.Box3().setFromObject(sBlock));
                    }
                }
            }
        }

        // ---------------------------------------------------------
        // 5. 槍械模型
        // ---------------------------------------------------------
        const weaponGroup = new THREE.Group();
        const matGunMetal = new THREE.MeshLambertMaterial({ color: 0x1e1e1e });
        const matGunStock = new THREE.MeshLambertMaterial({ color: 0x3d2514 });

        const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.14, 0.6), matGunMetal);
        gBody.position.set(0.2, -0.18, -0.45); weaponGroup.add(gBody);

        const gBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.5), matGunMetal);
        gBarrel.position.set(0.2, -0.14, -0.85); weaponGroup.add(gBarrel);

        const gStock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.3), matGunStock);
        gStock.position.set(0.2, -0.16, -0.15); weaponGroup.add(gStock);

        const flashMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, visible: false });
        const muzzleFlash = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), flashMat);
        muzzleFlash.position.set(0.2, -0.14, -1.15); weaponGroup.add(muzzleFlash);

        camera.add(weaponGroup);

        // ---------------------------------------------------------
        // 6. 殭屍、血條與傷害數字
        // ---------------------------------------------------------
        const zombies = [];
        const damageNumbers = [];

        function createHealthBar() {
            const group = new THREE.Group();
            const bg = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.12), new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide }));
            group.add(bg);

            const fgGeo = new THREE.PlaneGeometry(0.96, 0.08);
            fgGeo.translate(0.48, 0, 0);
            const fg = new THREE.Mesh(fgGeo, new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide }));
            fg.position.set(-0.48, 0, 0.01);
            group.add(fg);

            group.position.set(0, 2.2, 0);
            return { group, fg };
        }

        function createZombie(x, z) {
            const zGroup = new THREE.Group();
            const matSkin = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
            const matClothes = new THREE.MeshLambertMaterial({ color: 0x00838f });
            const matPants = new THREE.MeshLambertMaterial({ color: 0x283593 });

            const headMaterials = [
                matSkin, matSkin, matSkin, matSkin, matSkin,
                new THREE.MeshLambertMaterial({ map: texZombieFace })
            ];
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), headMaterials);
            head.position.y = 1.45; head.castShadow = true; zGroup.add(head);

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.85, 0.35), matClothes);
            body.position.y = 0.7; body.castShadow = true; zGroup.add(body);

            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.75, 0.22), matClothes);
            armL.position.set(-0.45, 0.75, -0.3); armL.rotation.x = -Math.PI / 2; zGroup.add(armL);

            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.75, 0.22), matClothes);
            armR.position.set(0.45, 0.75, -0.3); armR.rotation.x = -Math.PI / 2; zGroup.add(armR);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), matPants);
            legL.position.set(-0.2, 0.0, 0); zGroup.add(legL);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), matPants);
            legR.position.set(0.2, 0.0, 0); zGroup.add(legR);

            const hpBar = createHealthBar();
            zGroup.add(hpBar.group);

            zGroup.position.set(x, 0.5, z);
            scene.add(zGroup);

            return {
                mesh: zGroup, skinMat: matSkin, hp: 100, maxHp: 100,
                hpBarFg: hpBar.fg, hpBarGroup: hpBar.group,
                legL, legR, animTime: Math.random() * 10,
                radius: 0.5
            };
        }

        for(let i=0; i<6; i++) {
            zombies.push(createZombie((Math.random()-0.5)*35, (Math.random()-0.5)*35));
        }

        function spawnDamageNumber(pos, damage) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffff00'; ctx.font = 'Bold 40px Arial';
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 4;
            ctx.strokeText("-" + damage, 10, 50);
            ctx.fillText("-" + damage, 10, 50);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(1.2, 0.6, 1);
            sprite.position.copy(pos).add(new THREE.Vector3(0, 1.5, 0));
            scene.add(sprite);

            damageNumbers.push({ sprite, life: 30, velY: 0.03 });
        }

        // ---------------------------------------------------------
        // 7. 玩家狀態與 AABB 物理動態碰撞檢測
        // ---------------------------------------------------------
        const player = new THREE.Group();
        player.position.set(0, 2, 0);
        scene.add(player);
        player.add(camera);
        camera.position.set(0, 1.4, 0);

        let pitchAngle = 0, yawAngle = 0;
        let recoilOffset = 0;
        let playerVelY = 0;
        const gravity = -24.0;
        let isGrounded = false;
        
        const moveState = { f: 0, r: 0 };
        let isAiming = false, isReloading = false;
        let ammo = 30, reserveAmmo = 120, kills = 0, hp = 100;
        const raycaster = new THREE.Raycaster();

        // 玩家碰撞體邊界點 (半徑 0.35, 高度 1.8)
        function checkPlayerCollision(newPos) {
            const pBox = new THREE.Box3(
                new THREE.Vector3(newPos.x - 0.35, newPos.y - 1.4, newPos.z - 0.35),
                new THREE.Vector3(newPos.x + 0.35, newPos.y + 0.4, newPos.z + 0.35)
            );
            
            for (let collider of colliders) {
                if (pBox.intersectsBox(collider)) return true;
            }
            return false;
        }

        function handlePhysics(delta) {
            // 重力處理
            playerVelY += gravity * delta;
            let nextY = player.position.y + playerVelY * delta;

            // Y 軸地面判定 (腳下高為 Y=0.5 方塊頂面 + 身高 1.4)
            if (nextY <= 1.9) {
                nextY = 1.9;
                playerVelY = 0;
                isGrounded = true;
            } else {
                isGrounded = false;
            }
            player.position.y = nextY;

            // X/Z 軸牆壁碰撞移動分量離散檢測
            if (moveState.f !== 0 || moveState.r !== 0) {
                const moveVec = new THREE.Vector3(moveState.r, 0, -moveState.f).normalize();
                moveVec.applyAxisAngle(new THREE.Vector3(0, 1, 0), yawAngle);
                const step = 7.0 * delta;

                // 先試探 X 軸移動
                const testX = new THREE.Vector3(player.position.x + moveVec.x * step, player.position.y, player.position.z);
                if (!checkPlayerCollision(testX)) {
                    player.position.x = testX.x;
                }

                // 再試探 Z 軸移動
                const testZ = new THREE.Vector3(player.position.x, player.position.y, player.position.z + moveVec.z * step);
                if (!checkPlayerCollision(testZ)) {
                    player.position.z = testZ.z;
                }
            }

            // 地圖邊界防落
            player.position.x = Math.max(-MAP_SIZE + 0.8, Math.min(MAP_SIZE - 0.8, player.position.x));
            player.position.z = Math.max(-MAP_SIZE + 0.8, Math.min(MAP_SIZE - 0.8, player.position.z));
        }

        // ---------------------------------------------------------
        // 8. 射擊與換彈邏輯 (動畫與變數修復)
        // ---------------------------------------------------------
        function reload() {
            if (isReloading || ammo === 30 || reserveAmmo <= 0) return;
            isReloading = true;
            playSound(400, 0.2, 'sine', 0.2);

            let reloadProgress = 0;
            const reloadInterval = setInterval(() => {
                reloadProgress += 0.08;
                weaponGroup.rotation.x = Math.sin(reloadProgress * Math.PI) * 0.6;
                if (reloadProgress >= 1.0) {
                    clearInterval(reloadInterval);
                    weaponGroup.rotation.x = 0;
                    const needed = 30 - ammo;
                    const loaded = Math.min(needed, reserveAmmo);
                    ammo += loaded;
                    reserveAmmo -= loaded;
                    document.getElementById('ammo').innerText = ammo;
                    document.getElementById('reserve').innerText = reserveAmmo;
                    isReloading = false;
                }
            }, 80);
        }

        function shoot() {
            if (isReloading) return;
            if (ammo <= 0) { reload(); return; }

            ammo--;
            document.getElementById('ammo').innerText = ammo;
            playSound(320, 0.1, 'sawtooth', 0.3);

            recoilOffset += 0.035;

            flashMat.visible = true;
            setTimeout(() => flashMat.visible = false, 30);
            weaponGroup.position.z += 0.08;

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const zMeshes = zombies.map(z => z.mesh);
            const hits = raycaster.intersectObjects(zMeshes, true);

            if (hits.length > 0) {
                let hitObj = hits[0].object;
                while (hitObj.parent && !zombies.some(z => z.mesh === hitObj)) hitObj = hitObj.parent;
                const targetZ = zombies.find(z => z.mesh === hitObj);

                if (targetZ) {
                    const dmg = 35;
                    targetZ.hp -= dmg;
                    playSound(650, 0.08, 'sine', 0.3);

                    spawnDamageNumber(hits[0].point, dmg);

                    targetZ.skinMat.color.setHex(0xff3333);
                    setTimeout(() => targetZ.skinMat.color.setHex(0x2e7d32), 100);

                    const hm = document.getElementById('hitmarker');
                    hm.style.opacity = '1'; setTimeout(() => hm.style.opacity = '0', 60);

                    targetZ.hpBarFg.scale.x = Math.max(0, targetZ.hp / targetZ.maxHp);

                    if (targetZ.hp <= 0) {
                        scene.remove(targetZ.mesh);
                        zombies.splice(zombies.indexOf(targetZ), 1);
                        kills++; document.getElementById('kills').innerText = kills;

                        setTimeout(() => zombies.push(createZombie((Math.random()-0.5)*35, (Math.random()-0.5)*35)), 2000);
                    }
                }
            }
        }

        // ---------------------------------------------------------
        // 9. 全平臺控制綁定與修復
        // ---------------------------------------------------------
        const instructions = document.getElementById('instructions');
        let isLocked = false;

        if (!isMobile) {
            instructions.addEventListener('click', () => {
                document.body.requestPointerLock();
                playSound(100, 0.01, 'sine', 0.01); // 激活 AudioContext
            });

            document.addEventListener('pointerlockchange', () => {
                isLocked = (document.pointerLockElement === document.body);
                instructions.style.display = isLocked ? 'none' : '';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isLocked) return;
                yawAngle -= e.movementX * 0.0022;
                pitchAngle -= e.movementY * 0.0022;
                pitchAngle = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitchAngle));
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') moveState.f = 1;
                if (e.code === 'KeyS') moveState.f = -1;
                if (e.code === 'KeyA') moveState.r = -1;
                if (e.code === 'KeyD') moveState.r = 1;
                if (e.code === 'KeyR') reload();
                if (e.code === 'Space' && isGrounded) { playerVelY = 8.5; isGrounded = false; }
            });

            document.addEventListener('keyup', (e) => {
                if (['KeyW','KeyS'].includes(e.code)) moveState.f = 0;
                if (['KeyA','KeyD'].includes(e.code)) moveState.r = 0;
            });

            document.addEventListener('mousedown', (e) => {
                if (!isLocked) return;
                if (e.button === 0) shoot();
                if (e.button === 2) isAiming = true;
            });
            document.addEventListener('mouseup', (e) => { if (e.button === 2) isAiming = false; });
            document.addEventListener('contextmenu', e => e.preventDefault());
        } else {
            // 手機端邏輯修復
            instructions.style.display = 'none';
            document.getElementById('joystick-zone').style.display = 'block';
            document.getElementById('btn-fire').style.display = 'flex';
            document.getElementById('btn-ads').style.display = 'flex';
            document.getElementById('btn-reload').style.display = 'flex';
            document.getElementById('btn-jump').style.display = 'flex';

            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            let joyTouchId = null;
            let lookTouchId = null;
            let lastLookX = 0, lastLookY = 0;

            document.addEventListener('touchstart', (e) => {
                playSound(100, 0.01, 'sine', 0.01);
                for (let touch of e.changedTouches) {
                    if (touch.clientX < window.innerWidth / 2 && joyTouchId === null) {
                        joyTouchId = touch.identifier;
                    } else if (touch.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                        lookTouchId = touch.identifier;
                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;
                    }
                }
            });

            document.addEventListener('touchmove', (e) => {
                for (let touch of e.changedTouches) {
                    if (touch.identifier === joyTouchId) {
                        const rect = base.getBoundingClientRect();
                        let dx = touch.clientX - (rect.left + rect.width / 2);
                        let dy = touch.clientY - (rect.top + rect.height / 2);
                        const dist = Math.min(Math.hypot(dx, dy), 40);
                        const angle = Math.atan2(dy, dx);
                        
                        stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                        moveState.r = Math.cos(angle) * (dist / 40);
                        moveState.f = -Math.sin(angle) * (dist / 40);
                    } else if (touch.identifier === lookTouchId) {
                        const dx = touch.clientX - lastLookX;
                        const dy = touch.clientY - lastLookY;
                        yawAngle -= dx * 0.005;
                        pitchAngle -= dy * 0.005;
                        pitchAngle = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitchAngle));
                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;
                    }
                }
            });

            document.addEventListener('touchend', (e) => {
                for (let touch of e.changedTouches) {
                    if (touch.identifier === joyTouchId) {
                        joyTouchId = null;
                        stick.style.transform = `translate(0px, 0px)`;
                        moveState.f = 0; moveState.r = 0;
                    } else if (touch.identifier === lookTouchId) {
                        lookTouchId = null;
                    }
                }
            });

            document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
            document.getElementById('btn-ads').addEventListener('touchstart', (e) => { e.preventDefault(); isAiming = !isAiming; });
            document.getElementById('btn-reload').addEventListener('touchstart', (e) => { e.preventDefault(); reload(); });
            document.getElementById('btn-jump').addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if(isGrounded) { playerVelY = 8.5; isGrounded = false; } 
            });
        }

        // ---------------------------------------------------------
        // 10. 遊戲主循環
        // ---------------------------------------------------------
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);

            handlePhysics(delta);

            // 後座力復位與視角旋轉
            recoilOffset = THREE.MathUtils.lerp(recoilOffset, 0, 14 * delta);
            player.rotation.y = yawAngle;
            camera.rotation.x = pitchAngle + recoilOffset;

            // 槍械槍晃 (Sway) & 復位
            if (moveState.f !== 0 || moveState.r !== 0) {
                weaponGroup.position.y = THREE.MathUtils.lerp(weaponGroup.position.y, -0.05 + Math.sin(time * 0.012) * 0.015, 0.1);
                weaponGroup.position.x = THREE.MathUtils.lerp(weaponGroup.position.x, Math.cos(time * 0.006) * 0.015, 0.1);
            } else {
                weaponGroup.position.x = THREE.MathUtils.lerp(weaponGroup.position.x, 0, 0.1);
                weaponGroup.position.y = THREE.MathUtils.lerp(weaponGroup.position.y, 0, 0.1);
            }

            // 開鏡瞄準動畫 (ADS)
            const targetFov = isAiming ? 45 : 75;
            camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, 14 * delta);
            camera.updateProjectionMatrix();

            const targetGunPos = isAiming ? new THREE.Vector3(-0.2, 0.02, -0.15) : new THREE.Vector3(0, 0, 0);
            weaponGroup.position.lerp(targetGunPos, 14 * delta);

            // 飄動傷害數字
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                const dn = damageNumbers[i];
                dn.sprite.position.y += dn.velY;
                dn.life--;
                if (dn.life <= 0) {
                    scene.remove(dn.sprite);
                    damageNumbers.splice(i, 1);
                }
            }

            // 殭屍 AI, 分離推擠碰撞與動畫
            for (let i = 0; i < zombies.length; i++) {
                const z1 = zombies[i];
                const z1Pos = z1.mesh.position;
                const pPos = player.position;

                z1.hpBarGroup.lookAt(camera.position);

                // 追擊玩家
                const angle = Math.atan2(pPos.x - z1Pos.x, pPos.z - z1Pos.z);
                z1.mesh.rotation.y = angle;

                z1Pos.x += Math.sin(angle) * 2.5 * delta;
                z1Pos.z += Math.cos(angle) * 2.5 * delta;

                // 殭屍與殭屍之間的推擠（防重疊）
                for (let j = i + 1; j < zombies.length; j++) {
                    const z2 = zombies[j];
                    const dist = z1Pos.distanceTo(z2.mesh.position);
                    const minDist = z1.radius + z2.radius;
                    if (dist < minDist && dist > 0) {
                        const overlap = minDist - dist;
                        const push = z1Pos.clone().sub(z2.mesh.position).normalize().multiplyScalar(overlap * 0.5);
                        z1Pos.add(push);
                        z2.mesh.position.sub(push);
                    }
                }

                // 雙腿走路動畫
                z1.animTime += delta * 8;
                z1.legL.rotation.x = Math.sin(z1.animTime) * 0.6;
                z1.legR.rotation.x = -Math.sin(z1.animTime) * 0.6;

                // 玩家傷害判定
                if (pPos.distanceTo(z1Pos) < 1.3) {
                    hp = Math.max(0, hp - 0.25);
                    document.getElementById('hp').innerText = Math.floor(hp);
                    if (hp <= 0) { alert("你被殭屍吃掉了！擊殺數: " + kills); location.reload(); }
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
