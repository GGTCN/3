<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 麥塊風格 FPS 槍戰系統</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }
        /* 準心 (Crosshair) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: 0; width: 10px; height: 2px; }
        #crosshair::after { top: 0; left: 4px; width: 2px; height: 10px; }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>點擊螢幕開始遊戲</h1>
        <p>W, A, S, D = 移動 | 空格 = 跳躍</p>
        <p>滑鼠左鍵 = 射擊 | 滑鼠右鍵 = 瞄準 (ADS)</p>
    </div>

    <div id="crosshair"></div>

    <!-- 導入 Three.js 與 PointerLockControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // 1. 基本場景與相機設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 天空藍
        scene.fog = new THREE.Fog(0x87ceeb, 10, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 光照設定
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 2. 建立麥塊風格的地形 (Voxel / 方塊)
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
        const grassMaterial = new THREE.MeshLambertMaterial({ color: 0x557a2b });
        const targetMaterial = new THREE.MeshLambertMaterial({ color: 0xd9534f });

        // 地板 (由方塊組成的地面)
        for (let x = -20; x <= 20; x++) {
            for (let z = -20; z <= 20; z++) {
                const block = new THREE.Mesh(boxGeometry, grassMaterial);
                block.position.set(x, -0.5, z);
                block.receiveShadow = true;
                scene.add(block);
            }
        }

        // 建立幾個靶子方塊 (Target Boxes)
        const targets = [];
        for (let i = 0; i < 5; i++) {
            const target = new THREE.Mesh(boxGeometry, targetMaterial);
            target.position.set((Math.random() - 0.5) * 20, 1.5, -5 - Math.random() * 10);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }

        // 3. 第一人稱控制器與移動邏輯
        const controls = new THREE.PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = '');

        scene.add(controls.getObject());

        const moveState = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveState.forward = true;
            if (e.code === 'KeyS') moveState.backward = true;
            if (e.code === 'KeyA') moveState.left = true;
            if (e.code === 'KeyD') moveState.right = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveState.forward = false;
            if (e.code === 'KeyS') moveState.backward = false;
            if (e.code === 'KeyA') moveState.left = false;
            if (e.code === 'KeyD') moveState.right = false;
        });

        // 4. 專業槍戰核心：開鏡 (ADS) 與射擊 (Raycasting + 後座力)
        let isAiming = false;
        const raycaster = new THREE.Raycaster();

        // 滑鼠監聽
        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;

            if (e.button === 0) {
                shoot(); // 左鍵射擊
            } else if (e.button === 2) {
                isAiming = true; // 右鍵開鏡
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 2) isAiming = false;
        });

        // 防止右鍵選單彈出
        document.addEventListener('contextmenu', e => e.preventDefault());

        function shoot() {
            // A. 後座力效果 (Recoil)
            camera.rotation.x += 0.02;

            // B. 彈道 Raycast 檢測
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitObj = intersects[0].object;
                // 擊中效果：改變顏色並往後倒
                hitObj.material.color.setHex(0xffffff);
                setTimeout(() => hitObj.material.color.setHex(0xd9534f), 100);
                hitObj.position.z -= 0.2;
            }
        }

        // 5. 遊戲主循環 (Main Loop)
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // 移動衰減
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize();

                if (moveState.forward || moveState.backward) velocity.z -= direction.z * 100.0 * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // 平滑開鏡 (ADS FOV 縮放)
                const targetFOV = isAiming ? 45 : 75;
                camera.fov += (targetFOV - camera.fov) * 0.1;
                camera.updateProjectionMatrix();
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        // 視窗大小自適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
